<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生成二维码</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #1a1a2e;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    padding: 32px;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
  label { display: block; text-align: left; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #333; }
  input[type="text"] {
    width: 100%; padding: 10px 14px; border: 1px solid #d0d5dd; border-radius: 8px;
    font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  .btn {
    display: inline-block; padding: 10px 24px; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s;
    margin-top: 12px;
  }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-secondary { background: #e5e7eb; color: #333; }
  .btn-secondary:hover { background: #d1d5db; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .qrcode-area {
    margin: 24px 0;
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #qrcode { display: inline-block; padding: 12px; background: #fff; border-radius: 8px; }
  #qrcode img, #qrcode canvas { display: block; }
  .hint { font-size: 13px; color: #999; margin-top: 4px; }
  .footer { text-align: center; font-size: 12px; color: #aaa; margin-top: 16px; }
  .actions { display: flex; gap: 10px; justify-content: center; }
</style>
</head>
<body>
<div class="card">
  <h1>二维码生成器</h1>
  <p class="subtitle">输入网址生成扫码可用的二维码</p>

  <label for="urlInput">网址 URL</label>
  <input type="text" id="urlInput" placeholder="例如: http://192.168.1.100:8080/" />

  <div class="qrcode-area" id="qrcodeArea">
    <div id="qrcode"></div>
  </div>

  <div class="actions">
    <button class="btn btn-secondary" id="downloadBtn" disabled>下载 PNG</button>
  </div>
  <div class="hint" id="hint">请输入或粘贴 URL 后自动生成二维码</div>
</div>

<div class="footer">扫描二维码即可打开链接</div>

<script>
let currentQR = null;
let currentURL = '';
const urlInput = document.getElementById('urlInput');
const hint = document.getElementById('hint');
const downloadBtn = document.getElementById('downloadBtn');
const qrContainer = document.getElementById('qrcode');

function generateQR(text) {
  qrContainer.innerHTML = '';
  if (!text || text.trim() === '') {
    hint.textContent = '请输入或粘贴 URL';
    downloadBtn.disabled = true;
    return;
  }
  try {
    currentQR = new QRCode(qrContainer, {
      text: text.trim(),
      width: 220,
      height: 220,
      colorDark: '#1a1a2e',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
    currentURL = text.trim();
    hint.textContent = '二维码已生成';
    downloadBtn.disabled = false;
  } catch(e) {
    hint.textContent = '生成失败，请检查 URL 格式';
    downloadBtn.disabled = true;
  }
}

urlInput.addEventListener('input', () => generateQR(urlInput.value));

downloadBtn.addEventListener('click', () => {
  const canvas = qrContainer.querySelector('canvas');
  const img = qrContainer.querySelector('img');
  if (canvas) {
    const link = document.createElement('a');
    link.download = 'qrcode.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } else if (img) {
    const link = document.createElement('a');
    link.download = 'qrcode.png';
    link.href = img.src;
    link.click();
  }
});

// Generate with demo URL on load
generateQR('http://localhost:8080/');
</script>
</body>
</html>
