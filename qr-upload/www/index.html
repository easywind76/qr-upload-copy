<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>文件上传</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;color:#1a1a2e}
.app{max-width:560px;width:100%}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.08);padding:32px;margin-bottom:20px}
h1{font-size:22px;font-weight:600;text-align:center;margin-bottom:4px}
.subtitle{text-align:center;color:#666;font-size:14px;margin-bottom:24px}
.dropzone{border:2px dashed #d0d5dd;border-radius:10px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s ease;background:#fafbfc}
.dropzone:hover,.dropzone.dragover{border-color:#2563eb;background:#eff6ff}
.dropzone.has-file{border-style:solid;border-color:#2563eb;background:#eff6ff;padding:20px}
.dropzone-icon{width:48px;height:48px;margin:0 auto 12px;background:#eef2ff;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#2563eb}
.dropzone-icon svg{width:24px;height:24px}
.dropzone-text{font-size:15px;color:#333}
.dropzone-hint{font-size:13px;color:#999;margin-top:6px}
.file-info{display:none;align-items:center;gap:12px;text-align:left}
.dropzone.has-file .file-icon,.dropzone.has-file .file-name,.dropzone.has-file .file-size,.dropzone.has-file .file-remove{display:block}
.dropzone.has-file .dropzone-icon,.dropzone.has-file .dropzone-text,.dropzone.has-file .dropzone-hint{display:none}
.dropzone.has-file .file-info{display:flex}
.file-icon{width:40px;height:40px;background:#e0e7ff;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#4338ca}
.file-details{flex:1;min-width:0}
.file-name{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-size{font-size:12px;color:#999}
.file-remove{background:none;border:none;color:#999;cursor:pointer;padding:4px;border-radius:4px;line-height:1}
.file-remove:hover{color:#e53e3e;background:#fee2e2}
.btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;transition:all .2s;margin-top:16px;background:#2563eb;color:#fff}
.btn:hover{background:#1d4ed8}
.btn:disabled{background:#93c5fd;cursor:not-allowed}
.btn-green{background:#059669}
.btn-green:hover{background:#047857}
.progress-wrap{width:100%;margin-top:16px;display:none}
.progress-wrap.active{display:block}
.progress-bar{width:100%;height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:#2563eb;border-radius:3px;width:0%;transition:width .3s ease}
.progress-label{font-size:13px;color:#666;text-align:center;margin-top:6px}
.status{margin-top:16px;padding:12px;border-radius:8px;font-size:14px;display:none}
.status.success{display:block;background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
.status.error{display:block;background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.qrcode-section{text-align:center}
.qrcode-section h2{font-size:15px;font-weight:500;margin-bottom:12px;color:#666}
#qrcode{display:inline-block;padding:12px;background:#fff;border-radius:8px}
#qrcode img,#qrcode canvas{display:block}
.qrcode-url{margin-top:8px;font-size:12px;color:#999;word-break:break-all}
.footer{text-align:center;font-size:12px;color:#aaa;margin-top:8px}
</style>
</head>
<body>
<div class="app">
<div class="card">
<h1>文件上传</h1>
<p class="subtitle">选择文件后自动发送到管理者邮箱</p>
<div class="dropzone" id="dropzone">
<div class="dropzone-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
<div class="dropzone-text">点击或拖拽文件到此处</div>
<div class="dropzone-hint">支持任何格式</div>
<div class="file-info" id="fileInfo">
<div class="file-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg></div>
<div class="file-details"><div class="file-name" id="fileName"></div><div class="file-size" id="fileSize"></div></div>
<button class="file-remove" id="removeFile" style="display:block">x</button>
</div></div>
<button class="btn" id="uploadBtn" disabled>上传并发送</button>
<button class="btn btn-green" id="newBtn" style="display:none">上传新文件</button>
<div class="progress-wrap" id="progressWrap">
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="progress-label" id="progressLabel"></div>
</div>
<div class="status" id="status"></div>
</div>
<div class="card qrcode-section">
<h2>扫描二维码打开本页面</h2>
<div id="qrcode"></div>
<div class="qrcode-url" id="qrcodeUrl"></div>
</div>
<div class="footer">文件将通过加密方式传输到管理者邮箱</div>
</div>
<script>
var file = null;
var maxSize = 25*1024*1024;
var dz = document.getElementById('dropzone');
var fi = document.createElement('input');fi.type='file';fi.style.display='none';document.body.appendChild(fi);
var fn = document.getElementById('fileName');
var fs = document.getElementById('fileSize');
var ub = document.getElementById('uploadBtn');
var nb = document.getElementById('newBtn');
var st = document.getElementById('status');
var pw = document.getElementById('progressWrap');
var pf = document.getElementById('progressFill');
var pl = document.getElementById('progressLabel');

function fmt(b){return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB'}
function pick(f){if(!f)return;if(f.size>maxSize){msg('文件大小超过限制','error');return}
  file=f;fn.textContent=f.name;fs.textContent=fmt(f.size);dz.classList.add('has-file');ub.disabled=false;st.style.display='none'}
function reset(){file=null;dz.classList.remove('has-file');ub.disabled=true;fi.value='';st.style.display='none';pw.classList.remove('active');ub.style.display='block';nb.style.display='none'}
function msg(t,c){st.className='status '+c;st.innerHTML=(c==='success'?'OK ':'X ')+t;st.style.display='block'}
function prog(p,t){pw.classList.add('active');pf.style.width=p+'%';pl.textContent=t||'上传中 '+p+'%'}
dz.onclick=function(){fi.click()}
fi.onchange=function(e){if(e.target.files.length)pick(e.target.files[0])}
dz.ondragover=function(e){e.preventDefault();dz.classList.add('dragover')}
dz.ondragleave=function(){dz.classList.remove('dragover')}
dz.ondrop=function(e){e.preventDefault();dz.classList.remove('dragover');if(e.dataTransfer.files.length)pick(e.dataTransfer.files[0])}
document.getElementById('removeFile').onclick=function(e){e.stopPropagation();reset()}
nb.onclick=reset;
ub.onclick=function(){if(!file)return;
  ub.disabled=true;ub.textContent='上传中...';st.style.display='none';prog(0,'准备中...');
  var r=new FileReader();
  r.onload=function(){
    var d=r.result.split(',')[1];prog(5,'编码完成');
    var x=new XMLHttpRequest();
    x.open('POST','/upload');
    x.setRequestHeader('Content-Type','application/json');
    x.upload.onprogress=function(e){if(e.lengthComputable){var p=5+Math.round(e.loaded/e.total*90);prog(p,'上传中 '+p+'%')}};
    x.onload=function(){
      if(x.status===200){
        try{var j=JSON.parse(x.responseText);
          if(j.success){prog(100,'上传完成！');msg('文件已发送到邮箱！','success');ub.style.display='none';nb.style.display='block'}
          else{msg(j.error||'上传失败','error')}
        }catch(e){msg('上传失败','error')}
      }else{msg('上传失败 (HTTP '+x.status+')','error')}
      ub.disabled=false;ub.textContent='上传并发送'
    };
    x.onerror=function(){msg('网络错误，请重试','error');ub.disabled=false;ub.textContent='上传并发送'};
    x.send(JSON.stringify({filename:file.name,contentType:file.type||'application/octet-stream',fileData:d}))
  };
  r.onerror=function(){msg('读取文件失败','error');ub.disabled=false;ub.textContent='上传并发送'};
  r.readAsDataURL(file)
};
var url=window.location.origin;
document.getElementById('qrcodeUrl').textContent=url;
new QRCode(document.getElementById('qrcode'),{text:url,width:180,height:180,colorDark:'#1a1a2e',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});
fetch('/config').then(function(r){return r.json()}).then(function(c){maxSize=c.maxFileSizeMB*1048576;var h=document.querySelector('.dropzone-hint');if(h)h.textContent='支持任何格式，最大 '+c.maxFileSizeMB+'MB'}).catch(function(){});
</script>
</body>
</html>
