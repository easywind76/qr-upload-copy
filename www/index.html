<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>文件上传</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:#f0f2f5;padding:20px;color:#1a1a2e}
.w{max-width:600px;margin:0 auto}
.c{background:#fff;border-radius:12px;padding:30px;box-shadow:0 2px 12px rgba(0,0,0,0.08);margin-bottom:16px}
h1{font-size:22px;text-align:center;margin-bottom:4px}
.sub{text-align:center;color:#666;font-size:14px;margin-bottom:20px}
.z{border:2px dashed #ccc;border-radius:10px;padding:36px;text-align:center;cursor:pointer}
.z:hover{border-color:#2563eb;background:#f5f8ff}
.z.a{border-color:#2563eb;background:#eff6ff;padding:20px}
.fi{display:none;align-items:center;justify-content:space-between}
.z.a .fi{display:flex}
.z.a .h{display:none}
.btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:15px;cursor:pointer;margin-top:14px;background:#2563eb;color:white}
.btn:disabled{background:#93c5fd;cursor:default}
.pv{height:6px;background:#e5e7eb;border-radius:3px;margin-top:14px;overflow:hidden;display:none}
.pv.s{display:block}
.pf{height:100%;background:#2563eb;border-radius:3px;width:0%;transition:width .3s}
.pt{font-size:13px;color:#666;text-align:center;margin-top:4px;display:none}
.pt.s{display:block}
.st{margin-top:14px;padding:12px;border-radius:8px;font-size:14px;display:none}
.st.g{display:block;background:#ecfdf5;color:#065f46}
.st.r{display:block;background:#fef2f2;color:#991b1b}
.files{margin-top:12px}
.file-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0}
.file-row:last-child{border-bottom:none}
.file-info{flex:1}
.file-name{font-size:14px;font-weight:500}
.file-meta{font-size:12px;color:#999;margin-top:2px}
.dl-btn{background:#2563eb;color:white;border:none;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;text-decoration:none;flex-shrink:0;margin-left:10px}
.dl-btn:hover{background:#1d4ed8}
</style>
</head>
<body>
<div class="w">
<div class="c">
<h1>文件上传</h1>
<p class="sub">选择文件上传到服务器</p>
<div class="z" id="z">
<p class="h" style="color:#666">点击或拖拽文件</p>
<div class="fi">
<span id="fn"></span>
<button id="rm" style="background:none;border:none;color:#999;cursor:pointer;font-size:16px">x</button>
</div>
</div>
<button class="btn" id="up" disabled>上传</button>
<div class="pv" id="pv"><div class="pf" id="pf"></div></div>
<div class="pt" id="pt"></div>
<div class="st" id="st"></div>
</div>
<div class="c">
<h2 style="font-size:18px;margin-bottom:12px">已上传文件</h2>
<div class="files" id="fl"></div>
</div>
</div>
<script>
var file=null, maxSize=500*1048576;
var fi=document.createElement("input");fi.type="file";fi.style.display="none";document.body.appendChild(fi);
var z=document.getElementById("z"),fn=document.getElementById("fn");
var ub=document.getElementById("up"),st=document.getElementById("st");
var pv=document.getElementById("pv"),pf=document.getElementById("pf"),pt=document.getElementById("pt");
var fl=document.getElementById("fl");
function pck(f){if(!f)return;if(f.size>maxSize){msg("文件超过大小限制","r");return}
  file=f;fn.textContent=f.name+" ("+fmt(f.size)+")";z.classList.add("a");ub.disabled=false;st.classList.remove("g","r");st.style.display="none"}
function rst(){file=null;z.classList.remove("a");ub.disabled=true;fi.value="";st.style.display="none";pv.classList.remove("s");pt.classList.remove("s");pf.style.width="0%"}
function msg(t,c){st.className="st "+c;st.innerHTML=(c=="g"?"OK ":"X ")+t}
function bar(p){pv.classList.add("s");pt.classList.add("s");pf.style.width=p+"%";pt.textContent=p+"%"}
function fmt(b){return b<1024?b+"B":b<1048576?(b/1024).toFixed(1)+"KB":(b/1048576).toFixed(1)+"MB"}
function loadFiles(){fetch("/files").then(function(r){return r.json()}).then(function(d){
  fl.innerHTML="";d.files.forEach(function(f){
    var row=document.createElement("div");row.className="file-row"
    row.innerHTML='<div class="file-info"><div class="file-name">'+f.name+'</div><div class="file-meta">'+fmt(f.size)+" - "+f.time+'</div></div><a class="dl-btn" href="/download/'+encodeURIComponent(f.name)+'">下载</a>'
    fl.appendChild(row)
  })
  if(!d.files.length)fl.innerHTML='<p style="color:#999;text-align:center;padding:10px">暂无文件</p>'
}).catch(function(){})}
z.onclick=function(){fi.click()}
fi.onchange=function(e){if(e.target.files.length)pck(e.target.files[0])}
z.ondragover=function(e){e.preventDefault();z.style.borderColor="#2563eb"}
z.ondragleave=function(){z.style.borderColor="#ccc"}
z.ondrop=function(e){e.preventDefault();z.style.borderColor="#ccc";if(e.dataTransfer.files.length)pck(e.dataTransfer.files[0])}
document.getElementById("rm").onclick=function(e){e.stopPropagation();rst()}
ub.onclick=function(){if(!file)return
  ub.disabled=true;ub.textContent="上传中...";st.style.display="none";bar(0)
  var r=new FileReader()
  r.onload=function(){bar(10)
    var d=r.result.split(",")[1];bar(20)
    var x=new XMLHttpRequest()
    x.open("POST","/upload")
    x.setRequestHeader("Content-Type","application/json")
    x.upload.onprogress=function(e){if(e.lengthComputable){var p=20+Math.round(e.loaded/e.total*70);bar(p)}}
    x.onload=function(){bar(100);ub.disabled=false;ub.textContent="上传"
      if(x.status!=200){msg("服务器错误 "+x.status,"r");return}
      try{var j=JSON.parse(x.responseText)}catch(e){msg("响应解析失败","r");return}
      if(j.success){msg(j.message,"g");rst();loadFiles()}else{msg(j.message||"上传失败","r")}
    }
    x.onerror=function(){msg("网络错误","r");ub.disabled=false;ub.textContent="上传"}
    x.send(JSON.stringify({filename:file.name,fileData:d}))
  }
  r.onerror=function(){msg("读取文件失败","r");ub.disabled=false;ub.textContent="上传"}
  r.readAsDataURL(file)
}
loadFiles()
</script>
</body>
</html>
